name: "build"

on:
  push:
    tags:
      - 'v*'
  # Allow building the artifacts on demand without publishing a release.
  workflow_dispatch:

jobs:
  # Only runs for a real tag push; skipped for manual (workflow_dispatch) runs.
  create-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}

    steps:
      - name: create release
        id: create-release
        uses: softprops/action-gh-release@v1
        with:
          name: Spotiamp ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true

  bundle:
    needs: create-release
    # Run after create-release on a tag push, or on its own for a manual build
    # (where create-release is skipped).
    if: ${{ always() && needs.create-release.result != 'failure' && needs.create-release.result != 'cancelled' }}
    permissions:
      contents: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            artifact: "macos-aarch64"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            artifact: "macos-x86_64"
          - platform: "windows-latest"
            args: ""
            artifact: "windows-x86_64"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm install

      - uses: apple-actions/import-codesign-certs@v3
        if: matrix.platform == 'macos-latest'
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify Certificate
        if: matrix.platform == 'macos-latest'
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning signing_temp.keychain | grep "Developer ID Application")
          APPLE_SIGNING_IDENTITY=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> $GITHUB_ENV
          echo "Certificate imported."

      - name: Install trusted-signing-cli
        if: matrix.platform == 'windows-latest'
        run: cargo install trusted-signing-cli

      - uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        with:
          # Only upload to a release on a tag push; empty on manual builds so
          # tauri-action just builds the artifacts.
          tagName: ${{ needs.create-release.result == 'success' && github.ref || '' }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      # Manual builds have no release to attach to, so expose the bundles as
      # downloadable workflow artifacts instead.
      - name: upload build artifacts
        if: needs.create-release.result == 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: spotiamp-${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
          if-no-files-found: error

  # Only runs for a real tag push; flips the drafted release to published.
  publish-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, bundle]

    steps:
      - name: publish release
        id: publish-release
        uses: actions/github-script@v6
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })
